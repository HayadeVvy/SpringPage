<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<th:block th:fragment="header">
	<div class="menu-title">
		<h2>
			<a th:href="@{/main/home}">SpringPage</a>
		</h2>
	</div>
	<div class="menu-login">
		<!-- /*  ======= 사용자/관리자 공통 로그인 영역 시작*/ -->
		<th:block sec:authorize="isAuthenticated()">
			<div class="menu-item">
				<a th:href="@{/member/myPage}">
				<img th:src="@{/assets/images/myPage.png}" width="20" height="20">마이페이지</a>
			</div>
			<div class="menu-item">
				<img th:src="@{/member/photoView}" width="20" height="20" class="my-photo">
				<span class="user-name" th:text="${#authentication.principal.memberVO.userName}"></span>
			</div>
			<div class="memu-item">
				<a href="#" id='logout'><img th:src="@{/assets/images/logout.png}" width="20" height="20">로그아웃</a>
				<form th:action="@{/member/logout}" method="post" style="display:none;" id="frm_logout">
				</form>
				<script>
					const logout = document.getElementById('logout');
					logout.onclick = function(event){
						document.getElementById('frm_logout').submit();
						event.preventDefault();
					}
				</script>
			</div>
		</th:block>
		<!-- /*  ======= 사용자/관리자 공통 로그인 영역 끝*/ -->
		<!-- /*  ======= 사용자 비로그인 영역 시작*/ -->
		<th:block sec:authorize="!isAuthenticated()">
			<div class="menu-item">
				<a th:href="@{/member/registerUser}">회원가입</a>
			</div>
			
			
			<div class="menu-item">
			<a th:href="@{/member/login}"><img th:src="@{/assets/images/login.png}" width="20" height="20">로그인</a>
			</div>
		</th:block>
		<!-- /*  ======= 사용자 비로그인 영역 끝*/ -->
	</div>
	<div class="menu-list">
		<th:block sec:authorize="!isAuthenticated() || principal.memberVO.authorityOrdinal < 3">
		<div class="menu-main-item"><a th:href="@{/board/list}">게시판</a></div>
		</th:block>
	</div>
</th:block>
</html>
