<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta charset="UTF-8">
	<meta name="csrf-header" th:content="${_csrf.headerName}" />
	<meta name="csrf-token" th:content="${_csrf.token}">
	<title layout:title-pattern="$LAYOUT_TITLE > $CONTENT_TITLE">SpringPage 관리자</title>
	<link rel="stylesheet" th:href="@{/assets/css/common.css}" type="text/css">
</head>
<body>
<div id="main">
	<div id="main_header" th:insert="fragments/header::header"></div>
	<div class="side-height">
	    <!-- 네비게이션 시작 -->
		<div id="page_nav" th:insert="fragments/nav_admin::nav_admin"></div>
		<!-- 네비게이션 끝 -->
		<div id="page_body" layout:fragment="content"></div>
	</div>
	<div id="main_footer" class="page_clear" th:insert="fragments/footer::footer"></div>
</div>
</body>
</html>
