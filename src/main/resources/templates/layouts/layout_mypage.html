dlf<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout">
<head>

<meta name="csrf-header" th:content="${_csrf.headerName}">

<title layout:title-pattern="$LAYOUT_TITLE > $CONTENT_TITLE">Spring Page</title>
<link rel="stylesheet" th:href="@{/assets/css/common.css}" type="text/css">
<link rel="stylesheet" th:href="@{/assets/css/member.css}" type="text/css">

</head>
<body>
<div id="main">
	<!-- 헤더 -->
	<div id="main_header" th:insert="fragments/header::header"></div>
	
	<div class="side-height">

		<div id="page_nav" th:insert="fragments/nav_mypage::nav_mypage"></div>
		<!-- mypage navigation -->
		<!-- middle content-->
		<div id="page_body" layout:fragment="content"></div>

	</div>
	<div id="main_footer" th:insert="fragments/footer::footer"></div>

</html>
